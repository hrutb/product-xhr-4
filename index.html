<body>
    
    <div class="container">
        <header class="">
           <div class="row ">
              <div class="col-md-6 ">
                  <h1>Flipkart</h1>
              </div>
              <div class="col-md-6 d-flex justify-content-end align-items-center">
                 <button class="btn  btn-inline-block  btn-outline-primary" type="button" id="addBtn2">Add Product</button>
                 
                </div>
           </div>
        </header> 
        <div class="row">
            <div class="col-md-6 offset-md-3 mb-4  mt-4">
               <div class="productModel" id="productModel">
                   <div class="card">
                       <div class="card-header text-center bg-warning">
                              <h3>Product Card</h3>
                       </div>
                       <div class="card-body">
                            <form action="" id="productForm">
                               <div class="form-group">
                                   <label for="title">Product Name*</label>
                                   <input class="form-control" type="text" id="title">
                               </div>
       
                               <div class="form-group">
                                   <label for="price">Product Price*</label>
                                   <input class="form-control" type="number" id="price">
                               </div>
       
                               <div class="form-group">
                                   <label for="img">Product image*</label>
                                   <input class="form-control" type="text" id="img">
                               </div>
                               <div class="card-footer d-flex justify-content-between ">
                                   <button class="btn btn-block btn-outline-primary" id="addProduct">Add Product </button>
                                   <button class="btn btn-block btn-outline-primary d-none" id="updateProduct" type="button">Update Product</button>
                                
                               </div>
                            </form>
                       </div>
       
                   </div>
                
               </div>
            </div>
        </div>
    </div> 


   <div class="backdrop closebackdrop" id="backdrop"></div>
